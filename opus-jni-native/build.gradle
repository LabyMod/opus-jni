import org.apache.tools.ant.taskdefs.condition.Os

def cmakeGenDir = layout.buildDirectory.dir("cmake-gen").get().asFile
if (!cmakeGenDir.exists() && !cmakeGenDir.mkdirs()) {
    throw new GradleException("Failed to create directory ${cmakeGenDir.absolutePath}")
}

def cmakeArgs = []
if (is32bit) {
    if (!Os.isFamily(Os.FAMILY_WINDOWS)) {
        throw new GradleException("Only windows supports 32bit currently")
    } else {
        cmakeArgs += ["-A", "Win32", "-T", "host=x64"]
    }
} else if (Os.isFamily(Os.FAMILY_WINDOWS)) {
    cmakeArgs += ["-A", "x64", "-T", "host=x64"]
}

task cmakeGenerate(type: Exec) {
    workingDir cmakeGenDir
    commandLine(["cmake", file(".").absolutePath] + cmakeArgs + [
            "-DCMAKE_BUILD_TYPE=Release",
            "-DCMAKE_POLICY_VERSION_MINIMUM=3.5",
            "-DCMAKE_RUNTIME_OUTPUT_DIRECTORY=${nativeBinariesDir.absolutePath}",
            "-DCMAKE_LIBRARY_OUTPUT_DIRECTORY=${nativeBinariesDir.absolutePath}",
            "-DCMAKE_ARCHIVE_OUTPUT_DIRECTORY=${nativeBinariesDir.absolutePath}",
            "-DGENERATED_JNI_HEADERS_DIR=${generatedHeadersDir.absolutePath}"
    ])
}

task cmakeCompile(type: Exec) {
    dependsOn cmakeGenerate
    workingDir cmakeGenDir
    commandLine "cmake", "--build", ".", "--config", "Release"
}

task build {
    dependsOn cmakeCompile
}